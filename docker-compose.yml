# TrueNAS SCALE → Apps → "Discover Apps" → (top-right) "Custom App" →
# "Install via YAML". Paste this as-is and deploy — paths are already set for
# the main-pool/photos dataset.
#
# `git push` rebuilds the image; Watchtower below auto-pulls it within minutes.
#
# The container only ever writes to /data/incoming, /data/originals and
# /data/derived — your existing folders in the dataset are never touched.
services:
  media-ingestor:
    image: ghcr.io/christianprando/media-ingestor:latest
    container_name: media-ingestor
    restart: unless-stopped
    # Poll incoming/ every 30s; ingest a file once its size is stable for 20s.
    command: ["watch", "-c", "/config/config.toml", "--interval", "30", "--settle", "20"]
    volumes:
      # The media dataset, holding incoming/ originals/ derived/
      - /mnt/main-pool/photos:/data
      # The config file, read-only (lives in a hidden folder in the same dataset)
      - /mnt/main-pool/photos/.media-ingestor/config.toml:/config/config.toml:ro
    # The container runs as root, so archived files are root-owned. If your SMB
    # user / Immich needs to own them, set this to that user's UID:GID and make
    # sure it can write the dataset:
    # user: "3000:3000"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: media-ingestor-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"     # only update containers we label above
      WATCHTOWER_CLEANUP: "true"          # delete the old image after updating
      WATCHTOWER_POLL_INTERVAL: "300"     # check GHCR every 5 minutes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
