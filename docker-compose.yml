# TrueNAS SCALE → Apps → "Discover Apps" → (top-right) "Custom App" →
# "Install via YAML". Paste this, edit the two CHANGE-ME host paths, deploy.
#
# `git push` rebuilds the image; Watchtower below auto-pulls it within minutes.
services:
  media-ingestor:
    image: ghcr.io/christianprando/media-ingestor:latest
    container_name: media-ingestor
    restart: unless-stopped
    # Poll incoming/ every 30s; ingest a file once its size is stable for 20s.
    command: ["watch", "-c", "/config/config.toml", "--interval", "30", "--settle", "20"]
    volumes:
      # CHANGE-ME — host path to your config.toml (see DEPLOY.md for its contents)
      - /mnt/POOL/apps/media-ingestor/config.toml:/config/config.toml:ro
      # CHANGE-ME — host path to the media dataset (holds incoming/ originals/ derived/)
      - /mnt/POOL/media:/data
    # If you want archived files owned by a specific user instead of root,
    # uncomment and set to that user's UID:GID (and ensure it can write /data):
    # user: "3000:3000"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: media-ingestor-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"     # only update containers we label above
      WATCHTOWER_CLEANUP: "true"          # delete the old image after updating
      WATCHTOWER_POLL_INTERVAL: "300"     # check GHCR every 5 minutes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
